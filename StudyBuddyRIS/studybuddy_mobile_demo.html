
<h2 class="sr-only">StudyBuddy – interaktivni mobilni demo za organizacijo učenja</h2>
<div style="display:flex;justify-content:center;padding:1.5rem 0 1rem;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);">
  <div id="phone" style="width:358px;background:var(--color-background-primary);border-radius:36px;border:0.5px solid var(--color-border-secondary);overflow:hidden;display:flex;flex-direction:column;height:716px;">
    <div style="padding:13px 20px 3px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:500;color:var(--color-text-secondary);flex-shrink:0;">
      <span id="clock">--:--</span>
      <div style="display:flex;gap:5px;align-items:center;">
        <i class="ti ti-wifi" style="font-size:13px;" aria-hidden="true"></i>
        <i class="ti ti-battery-2" style="font-size:13px;" aria-hidden="true"></i>
      </div>
    </div>
    <div id="screen" style="flex:1;overflow-y:auto;overflow-x:hidden;"></div>
    <div id="bnav" style="flex-shrink:0;border-top:0.5px solid var(--color-border-tertiary);padding:4px 0 6px;display:none;"></div>
  </div>
</div>
<script>
const C={
  blue:{bg:'#E6F1FB',bd:'#378ADD',tx:'#0C447C'},
  teal:{bg:'#E1F5EE',bd:'#1D9E75',tx:'#085041'},
  purple:{bg:'#EEEDFE',bd:'#7F77DD',tx:'#3C3489'},
  coral:{bg:'#FAECE7',bd:'#D85A30',tx:'#712B13'},
  amber:{bg:'#FAEEDA',bd:'#BA7517',tx:'#633806'},
};
const subjects=[
  {id:1,name:'Razvoj IS',short:'RIS',c:'blue',min:320},
  {id:2,name:'Matematika',short:'MAT',c:'teal',min:240},
  {id:3,name:'Algoritmi',short:'ALG',c:'purple',min:180},
  {id:4,name:'Baze podatkov',short:'BP',c:'coral',min:90},
];
const topics=[
  {id:1,sId:1,name:'UML diagrami'},{id:2,sId:1,name:'RUP metodologija'},{id:3,sId:1,name:'Primeri uporabe'},
  {id:4,sId:2,name:'Integrali'},{id:5,sId:2,name:'Diferencialne enačbe'},
  {id:6,sId:3,name:'Razporejanje'},{id:7,sId:3,name:'Grafovni algoritmi'},
  {id:8,sId:4,name:'SQL poizvedbe'},{id:9,sId:4,name:'Normalizacija'},
];
const tasks=[
  {id:1,sId:1,text:'Reši vaje za kolokij',done:false},
  {id:2,sId:1,text:'Preberi poglavje o RUP',done:true},
  {id:3,sId:1,text:'Nariši razredni diagram',done:false},
  {id:4,sId:2,text:'Ponovi integriranje',done:false},
  {id:5,sId:2,text:'Reši domačo nalogo',done:true},
  {id:6,sId:3,text:'Implementiraj quicksort',done:false},
  {id:7,sId:4,text:'Vaja: SQL JOIN',done:true},
];
const st={screen:'login',sid:null,session:null,dialog:false};
function gs(id){return subjects.find(s=>s.id===id);}
function fmt(m){const h=Math.floor(m/60),r=m%60;return h?h+'h'+(r?' '+r+'m':''):r+'min';}
function fmts(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return(h?h+':':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
function tot(){return subjects.reduce((a,s)=>a+s.min,0);}

function sLogin(){
  return`<div style="padding:36px 24px 20px;display:flex;flex-direction:column;align-items:center;">
  <div style="width:60px;height:60px;border-radius:16px;background:${C.blue.bg};border:0.5px solid ${C.blue.bd};display:flex;align-items:center;justify-content:center;margin-bottom:10px;">
    <i class="ti ti-book-2" style="font-size:28px;color:${C.blue.tx};" aria-hidden="true"></i>
  </div>
  <h1 style="font-size:22px;font-weight:500;margin:8px 0 4px;">StudyBuddy</h1>
  <p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 36px;">Organiziraj svoje učenje</p>
  <div style="width:100%;">
    <label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:3px;">E-poštni naslov</label>
    <input type="email" value="luka@uni.si" style="width:100%;box-sizing:border-box;margin-bottom:12px;"/>
    <label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:3px;">Geslo</label>
    <input type="password" value="geslo1234" style="width:100%;box-sizing:border-box;margin-bottom:22px;"/>
    <button onclick="nav('home')" style="width:100%;padding:12px;font-size:15px;font-weight:500;background:${C.blue.bd};color:#fff;border:none;border-radius:var(--border-radius-md);cursor:pointer;">Prijava</button>
  </div>
  <p style="margin-top:18px;font-size:13px;color:var(--color-text-tertiary);">Nimaš računa? <span style="color:${C.blue.tx};cursor:pointer;">Registracija</span></p>
</div>`;
}

function sHome(){
  const done=tasks.filter(t=>t.done).length;
  const sess=st.session?`<div onclick="nav('session')" style="margin:0 14px 10px;padding:11px 14px;background:${C.teal.bg};border:0.5px solid ${C.teal.bd};border-radius:var(--border-radius-lg);display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
  <div style="display:flex;align-items:center;gap:9px;">
    <div style="width:7px;height:7px;border-radius:50%;background:${C.teal.bd};"></div>
    <div><p style="margin:0;font-size:13px;font-weight:500;color:${C.teal.tx};">Aktivna seja</p>
    <p style="margin:0;font-size:11px;color:${C.teal.tx};opacity:.7;">${gs(st.session.sId)?.name} &middot; <span id="sessmini">${fmts(st.session.secs)}</span></p></div>
  </div>
  <i class="ti ti-chevron-right" style="font-size:15px;color:${C.teal.tx};" aria-hidden="true"></i>
</div>`:'';
  const cards=subjects.map(s=>{
    const c=C[s.c];const pct=Math.round(s.min/tot()*100);
    return`<div onclick="nav('detail',{sid:${s.id}})" style="padding:12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);cursor:pointer;">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">
    <div style="width:28px;height:28px;border-radius:7px;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:${c.tx};">${s.short}</div>
    <span style="font-size:14px;font-weight:500;">${s.name}</span>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:5px;"><span>${fmt(s.min)}</span><span>${pct}%</span></div>
  <div style="height:3px;background:var(--color-background-secondary);border-radius:2px;"><div style="height:100%;width:${pct}%;background:${c.bd};border-radius:2px;"></div></div>
</div>`;}).join('');
  return`<div style="padding:0 0 8px;">
  <div style="padding:14px 14px 10px;">
    <p style="margin:0 0 1px;font-size:12px;color:var(--color-text-secondary);">Dober dan,</p>
    <h2 style="margin:0;font-size:20px;font-weight:500;">Luka Karoli</h2>
  </div>
  <div style="padding:0 14px 10px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;">
    <div style="padding:11px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);">
      <p style="margin:0 0 3px;font-size:11px;color:var(--color-text-secondary);">Skupaj časa</p>
      <p style="margin:0;font-size:19px;font-weight:500;">${fmt(tot())}</p>
    </div>
    <div style="padding:11px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);">
      <p style="margin:0 0 3px;font-size:11px;color:var(--color-text-secondary);">Naloge</p>
      <p style="margin:0;font-size:19px;font-weight:500;">${done}/${tasks.length}</p>
    </div>
  </div>
  ${sess}
  <div style="padding:0 14px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <p style="margin:0;font-size:13px;font-weight:500;color:var(--color-text-secondary);">PREDMETI</p>
      <span onclick="nav('subjects')" style="font-size:12px;color:${C.blue.tx};cursor:pointer;">Prikaži vse</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:7px;">${cards}</div>
  </div>
</div>`;
}

function sSubjects(){
  const rows=subjects.map(s=>{
    const c=C[s.c];const tp=topics.filter(t=>t.sId===s.id);const tk=tasks.filter(t=>t.sId===s.id);const dk=tk.filter(t=>t.done).length;
    return`<div onclick="nav('detail',{sid:${s.id}})" style="padding:13px 14px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:11px;cursor:pointer;">
  <div style="width:40px;height:40px;border-radius:10px;background:${c.bg};border:0.5px solid ${c.bd};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:${c.tx};flex-shrink:0;">${s.short}</div>
  <div style="flex:1;min-width:0;">
    <p style="margin:0 0 2px;font-size:15px;font-weight:500;">${s.name}</p>
    <p style="margin:0;font-size:12px;color:var(--color-text-secondary);">${tp.length} tem &middot; ${fmt(s.min)} &middot; ${dk}/${tk.length} nalog</p>
  </div>
  <i class="ti ti-chevron-right" style="font-size:15px;color:var(--color-text-tertiary);" aria-hidden="true"></i>
</div>`;}).join('');
  return`<div>
  <div style="padding:14px 14px 12px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;justify-content:space-between;align-items:center;">
    <h2 style="margin:0;font-size:18px;font-weight:500;">Predmeti</h2>
    <i class="ti ti-plus" style="font-size:20px;color:var(--color-text-secondary);cursor:pointer;" aria-hidden="true"></i>
  </div>
  ${rows}
</div>`;
}

function sDetail(){
  const s=gs(st.sid);if(!s)return'';
  const c=C[s.c];
  const tp=topics.filter(t=>t.sId===s.id);const tk=tasks.filter(t=>t.sId===s.id);
  const tpRows=tp.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--color-border-tertiary);">
  <i class="ti ti-bookmark" style="font-size:15px;color:${c.bd};" aria-hidden="true"></i>
  <span style="font-size:14px;">${t.name}</span>
</div>`).join('');
  const tkRows=tk.map(t=>`<div onclick="tog(${t.id})" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;">
  <div style="width:20px;height:20px;border-radius:5px;border:0.5px solid ${t.done?c.bd:'var(--color-border-secondary)'};background:${t.done?c.bg:'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    ${t.done?`<i class="ti ti-check" style="font-size:13px;color:${c.tx};" aria-hidden="true"></i>`:''}
  </div>
  <span style="font-size:14px;${t.done?'text-decoration:line-through;color:var(--color-text-tertiary);':''}">${t.text}</span>
</div>`).join('');
  return`<div>
  <div style="padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:9px;">
    <button onclick="nav('subjects')" style="border:none;background:none;padding:0;cursor:pointer;display:flex;align-items:center;color:var(--color-text-secondary);">
      <i class="ti ti-arrow-left" style="font-size:20px;" aria-hidden="true"></i>
    </button>
    <div style="width:34px;height:34px;border-radius:9px;background:${c.bg};border:0.5px solid ${c.bd};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:${c.tx};">${s.short}</div>
    <div>
      <h2 style="margin:0;font-size:16px;font-weight:500;">${s.name}</h2>
      <p style="margin:0;font-size:11px;color:var(--color-text-secondary);">${fmt(s.min)} skupaj</p>
    </div>
  </div>
  <div style="padding:12px 14px 0;">
    <p style="margin:0 0 2px;font-size:11px;font-weight:500;color:var(--color-text-secondary);">TEME</p>
    ${tpRows}
  </div>
  <div style="padding:12px 14px 0;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
      <p style="margin:0;font-size:11px;font-weight:500;color:var(--color-text-secondary);">NALOGE</p>
      <span style="font-size:12px;color:${c.tx};cursor:pointer;">+ Dodaj</span>
    </div>
    ${tkRows}
  </div>
  <div style="padding:14px;">
    <button onclick="startSess(${s.id})" style="width:100%;padding:12px;font-size:15px;font-weight:500;background:${c.bd};color:#fff;border:none;border-radius:var(--border-radius-md);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;">
      <i class="ti ti-player-play" style="font-size:15px;" aria-hidden="true"></i>Začni sejo
    </button>
  </div>
</div>`;
}

function sSession(){
  if(!st.session)return'<p style="padding:20px;">Ni aktivne seje.</p>';
  const s=gs(st.session.sId);const c=C[s.c];
  if(st.dialog){
    return`<div style="min-height:520px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.42);">
  <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:22px;margin:20px;width:100%;box-sizing:border-box;">
    <h3 style="margin:0 0 7px;font-size:16px;font-weight:500;">Zaključi sejo?</h3>
    <p style="margin:0 0 18px;font-size:13px;color:var(--color-text-secondary);">Seja (${fmts(st.session.secs)}) bo shranjena v statistiko.</p>
    <div style="display:flex;gap:8px;">
      <button onclick="cancelEnd()" style="flex:1;padding:10px;font-size:14px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);cursor:pointer;">Prekliči</button>
      <button onclick="confirmEnd()" style="flex:1;padding:10px;font-size:14px;background:${c.bd};color:#fff;border:none;border-radius:var(--border-radius-md);cursor:pointer;">Potrdi</button>
    </div>
  </div>
</div>`;
  }
  return`<div style="padding:22px 22px 0;display:flex;flex-direction:column;align-items:center;">
  <div style="display:flex;align-items:center;gap:7px;margin-bottom:36px;align-self:flex-start;">
    <div style="width:7px;height:7px;border-radius:50%;background:${c.bd};"></div>
    <span style="font-size:12px;color:var(--color-text-secondary);">Aktivna seja</span>
  </div>
  <div style="width:34px;height:34px;border-radius:9px;background:${c.bg};border:0.5px solid ${c.bd};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:${c.tx};margin-bottom:7px;">${s.short}</div>
  <p style="margin:0 0 3px;font-size:19px;font-weight:500;">${s.name}</p>
  <p style="margin:0 0 32px;font-size:12px;color:var(--color-text-secondary);">Trajanje seje</p>
  <div id="timer-disp" style="font-size:54px;font-weight:500;font-variant-numeric:tabular-nums;margin-bottom:14px;">${fmts(st.session.secs)}</div>
  <div style="padding:5px 12px;background:${c.bg};border-radius:20px;font-size:12px;color:${c.tx};margin-bottom:36px;">${fmt(s.min)} skupaj</div>
  <button onclick="showDlg()" style="width:100%;padding:12px;font-size:15px;font-weight:500;background:var(--color-background-secondary);color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;">
    <i class="ti ti-player-stop" style="font-size:15px;" aria-hidden="true"></i>Zaključi sejo
  </button>
</div>`;
}

function sStats(){
  const mx=Math.max(...subjects.map(s=>s.min));
  const bars=subjects.map(s=>{const c=C[s.c];const pct=Math.round(s.min/mx*100);
  return`<div style="margin-bottom:11px;">
  <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
    <span style="font-size:13px;">${s.name}</span>
    <span style="font-size:13px;color:var(--color-text-secondary);">${fmt(s.min)}</span>
  </div>
  <div style="height:8px;background:var(--color-background-secondary);border-radius:4px;">
    <div style="height:100%;width:${pct}%;background:${c.bd};border-radius:4px;"></div>
  </div>
</div>`;}).join('');
  const dk=tasks.filter(t=>t.done).length;const pcd=Math.round(dk/tasks.length*100);
  return`<div style="padding:14px;">
  <h2 style="margin:0 0 14px;font-size:18px;font-weight:500;">Statistika</h2>
  <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:14px;">
    <div style="padding:11px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);">
      <p style="margin:0 0 3px;font-size:11px;color:var(--color-text-secondary);">Skupaj časa</p>
      <p style="margin:0;font-size:19px;font-weight:500;">${fmt(tot())}</p>
    </div>
    <div style="padding:11px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);">
      <p style="margin:0 0 3px;font-size:11px;color:var(--color-text-secondary);">Sej skupaj</p>
      <p style="margin:0;font-size:19px;font-weight:500;">12</p>
    </div>
  </div>
  <div style="padding:13px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:10px;">
    <p style="margin:0 0 11px;font-size:11px;font-weight:500;color:var(--color-text-secondary);">ČAS PO PREDMETIH</p>
    ${bars}
  </div>
  <div style="padding:13px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);">
    <p style="margin:0 0 9px;font-size:11px;font-weight:500;color:var(--color-text-secondary);">NAPREDEK NALOG</p>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="flex:1;height:9px;background:var(--color-background-secondary);border-radius:5px;">
        <div style="height:100%;width:${pcd}%;background:${C.teal.bd};border-radius:5px;"></div>
      </div>
      <span style="font-size:14px;font-weight:500;min-width:36px;">${dk}/${tasks.length}</span>
    </div>
  </div>
</div>`;
}

function sProfile(){
  return`<div style="padding:22px 14px;">
  <h2 style="margin:0 0 18px;font-size:18px;font-weight:500;">Profil</h2>
  <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:20px;">
    <div style="width:60px;height:60px;border-radius:50%;background:${C.blue.bg};border:0.5px solid ${C.blue.bd};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;color:${C.blue.tx};margin-bottom:9px;">LK</div>
    <p style="margin:0 0 3px;font-size:16px;font-weight:500;">Luka Karoli</p>
    <p style="margin:0;font-size:13px;color:var(--color-text-secondary);">luka@uni.si</p>
  </div>
  <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:10px;">
    <div style="padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;justify-content:space-between;"><span style="font-size:14px;">Ime in priimek</span><span style="font-size:14px;color:var(--color-text-secondary);">Luka Karoli</span></div>
    <div style="padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;justify-content:space-between;"><span style="font-size:14px;">E-pošta</span><span style="font-size:14px;color:var(--color-text-secondary);">luka@uni.si</span></div>
    <div style="padding:12px 14px;display:flex;justify-content:space-between;"><span style="font-size:14px;">Vpisan</span><span style="font-size:14px;color:var(--color-text-secondary);">Jan 2025</span></div>
  </div>
  <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;">
    <div style="padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
      <span style="font-size:14px;">Uredi profil</span>
      <i class="ti ti-chevron-right" style="font-size:15px;color:var(--color-text-tertiary);" aria-hidden="true"></i>
    </div>
    <div onclick="nav('login')" style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
      <span style="font-size:14px;color:var(--color-text-danger);">Odjava</span>
      <i class="ti ti-logout" style="font-size:15px;color:var(--color-text-danger);" aria-hidden="true"></i>
    </div>
  </div>
</div>`;
}

const NAVS=[
  {sc:'home',ic:'ti-home',lb:'Domov'},
  {sc:'subjects',ic:'ti-folder',lb:'Predmeti'},
  {sc:'session',ic:'ti-player-play',lb:'Seja'},
  {sc:'stats',ic:'ti-chart-bar',lb:'Stat'},
  {sc:'profile',ic:'ti-user',lb:'Profil'},
];

function rNav(){
  const el=document.getElementById('bnav');if(!el)return;
  if(st.screen==='login'){el.style.display='none';return;}
  el.style.display='flex';
  el.innerHTML=NAVS.map(n=>{
    const act=st.screen===n.sc||(n.sc==='subjects'&&st.screen==='detail');
    const col=act?C.blue.tx:'var(--color-text-tertiary)';
    const dot=n.sc==='session'&&st.session?`<div style="position:absolute;top:2px;right:calc(50% - 13px);width:6px;height:6px;background:${C.teal.bd};border-radius:50%;"></div>`:'';
    return`<div onclick="nav('${n.sc}')" style="flex:1;padding:6px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;position:relative;">
  ${dot}
  <i class="ti ${n.ic}" style="font-size:20px;color:${col};" aria-hidden="true"></i>
  <span style="font-size:10px;color:${col};font-weight:${act?500:400};">${n.lb}</span>
</div>`;}).join('');
}

function nav(sc,extra){
  if(extra)Object.assign(st,extra);
  st.screen=sc;render();
}
function startSess(id){
  if(st.session&&st.session.iid)clearInterval(st.session.iid);
  st.session={sId:id,secs:0,iid:null};
  st.session.iid=setInterval(()=>{
    st.session.secs++;
    const d=document.getElementById('timer-disp');if(d)d.textContent=fmts(st.session.secs);
    const m=document.getElementById('sessmini');if(m)m.textContent=fmts(st.session.secs);
  },1000);
  nav('session');
}
function showDlg(){st.dialog=true;render();}
function cancelEnd(){st.dialog=false;render();}
function confirmEnd(){
  if(st.session){
    const add=Math.floor(st.session.secs/60);
    const s=gs(st.session.sId);if(s)s.min+=add;
    clearInterval(st.session.iid);st.session=null;
  }
  st.dialog=false;nav('stats');
}
function tog(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;render();}}

const SCR={login:sLogin,home:sHome,subjects:sSubjects,detail:sDetail,session:sSession,stats:sStats,profile:sProfile};
function render(){
  const el=document.getElementById('screen');if(!el)return;
  const fn=SCR[st.screen];el.innerHTML=fn?fn():'';rNav();
}

function updClock(){
  const n=new Date();const el=document.getElementById('clock');
  if(el)el.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
setInterval(updClock,15000);updClock();
render();
</script>
